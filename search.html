<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>busca · ofertasdobliu</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #e8ff47;
            --text: #f0f0f0;
            --muted: #666666;
            --card-bg: #141414;
        }

        html,
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.25rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
            text-decoration: none;
        }

        .nav-logo span {
            color: var(--accent);
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            font-size: 0.85rem;
            color: var(--muted);
            text-decoration: none;
            transition: color 0.15s;
        }

        .nav-links a:hover {
            color: var(--text);
        }

        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 2rem;
        }

        .search-wrap {
            position: relative;
            margin-bottom: 2rem;
        }

        .search-input {
            width: 100%;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 4px;
            padding: 1rem 1.25rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .search-input:focus {
            border-color: var(--accent);
        }

        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .results-count {
            font-size: 0.8rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .sort-select {
            font-family: 'DM Sans', sans-serif;
            font-size: 0.8rem;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 0.3rem 0.6rem;
            border-radius: 2px;
            cursor: pointer;
            outline: none;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
        }

        .product-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 1rem;
            text-decoration: none;
            color: inherit;
            transition: border-color 0.15s, background 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .product-card:hover {
            border-color: var(--accent);
            background: #181818;
        }

        .product-thumb {
            width: 100%;
            height: 120px;
            object-fit: contain;
            background: #1a1a1a;
            border-radius: 2px;
        }

        .product-thumb-placeholder {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            border-radius: 2px;
        }

        .product-brand {
            font-size: 0.7rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .product-name {
            font-size: 0.85rem;
            font-weight: 500;
            line-height: 1.3;
            flex: 1;
        }

        .product-price {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 1rem;
            color: var(--accent);
        }

        .product-unavailable {
            font-size: 0.75rem;
            color: var(--muted);
        }

        .load-more {
            display: block;
            width: 100%;
            margin-top: 2rem;
            padding: 0.875rem;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.15s;
            text-align: center;
        }

        .load-more:hover {
            border-color: var(--accent);
            color: var(--text);
        }

        .load-more:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .loading {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            padding: 3rem 0;
        }

        .empty {
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
            padding: 3rem 0;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(12px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .product-grid {
            animation: fadeUp 0.3s ease both;
        }
    </style>
</head>

<body>

    <nav>
        <a class="nav-logo" href="/">ofertas<span>dobliu</span></a>
        <ul class="nav-links">
            <li><a href="changes.html">Variações</a></li>
            <li><a href="volatility.html">Volatilidade</a></li>
        </ul>
    </nav>

    <div class="container">
        <div class="search-wrap">
            <input class="search-input" type="text" id="search" placeholder="buscar produto..." autocomplete="off" />
        </div>

        <div class="results-header">
            <span class="results-count" id="results-count"></span>
            <select class="sort-select" id="sort">
                <option value="relevance">relevância</option>
                <option value="price_asc">menor preço</option>
                <option value="price_desc">maior preço</option>
            </select>
        </div>

        <div id="product-grid" class="product-grid">
            <p class="loading">buscando...</p>
        </div>

        <button class="load-more" id="load-more" style="display:none">carregar mais</button>
    </div>

    <script>
        const API = 'https://ofertasdobliu.onrender.com';
        const PAGE_SIZE = 40;

        const params = new URLSearchParams(window.location.search);
        let query = params.get('q') || '';
        let offset = 0;
        let allResults = [];
        let sortBy = 'relevance';

        const input = document.getElementById('search');
        const grid = document.getElementById('product-grid');
        const countEl = document.getElementById('results-count');
        const loadMoreBtn = document.getElementById('load-more');
        const sortSelect = document.getElementById('sort');

        input.value = query;
        document.title = query ? `"${query}" · ofertasdobliu` : 'busca · ofertasdobliu';

        let debounceTimer;
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            const q = input.value.trim();
            if (q.length < 2) return;
            debounceTimer = setTimeout(() => {
                query = q;
                window.history.replaceState({}, '', `search.html?q=${encodeURIComponent(q)}`);
                document.title = `"${q}" · ofertasdobliu`;
                allResults = [];
                offset = 0;
                fetchResults();
            }, 300);
        });

        input.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') input.blur();
        });

        sortSelect.addEventListener('change', () => {
            sortBy = sortSelect.value;
            renderGrid(true);
        });

        loadMoreBtn.addEventListener('click', () => {
            offset += PAGE_SIZE;
            renderGrid(false);
        });

        async function fetchResults() {
            grid.innerHTML = '<p class="loading">buscando...</p>';
            loadMoreBtn.style.display = 'none';
            countEl.textContent = '';

            try {
                const res = await fetch(`${API}/products/search?q=${encodeURIComponent(query)}&limit=200`);
                allResults = await res.json();
                offset = 0;
                renderGrid(true);
            } catch (e) {
                grid.innerHTML = '<p class="empty">erro ao buscar produtos</p>';
            }
        }

        function getSorted(items) {
            if (sortBy === 'price_asc') {
                return [...items].sort((a, b) => (a.price ?? Infinity) - (b.price ?? Infinity));
            }
            if (sortBy === 'price_desc') {
                return [...items].sort((a, b) => (b.price ?? -Infinity) - (a.price ?? -Infinity));
            }
            return items;
        }

        function renderGrid(reset) {
            const sorted = getSorted(allResults);
            const page = sorted.slice(0, offset + PAGE_SIZE);

            if (!page.length) {
                grid.innerHTML = '<p class="empty">nenhum produto encontrado</p>';
                loadMoreBtn.style.display = 'none';
                countEl.textContent = '';
                return;
            }

            countEl.textContent = `${allResults.length} produto${allResults.length !== 1 ? 's' : ''} encontrado${allResults.length !== 1 ? 's' : ''}`;

            const cards = page.map(item => {
                const thumb = item.image
                    ? `<img class="product-thumb" src="${item.image}" alt="" loading="lazy" onerror="this.style.display='none'">`
                    : `<div class="product-thumb-placeholder"></div>`;

                const priceEl = item.price != null
                    ? `<span class="product-price">${formatPrice(item.price)}</span>`
                    : `<span class="product-unavailable">indisponível</span>`;

                const productUrl = `product.html?sku=${item.sku}&ean=${encodeURIComponent(item.ean)}&name=${encodeURIComponent(item.name)}&brand=${encodeURIComponent(item.brand || '')}&image=${encodeURIComponent(item.image || '')}&url=${encodeURIComponent(item.url)}`;

                return `
        <a class="product-card" href="${productUrl}">
          ${thumb}
          <div class="product-brand">${item.brand || ''}</div>
          <div class="product-name">${item.name || '—'}</div>
          ${priceEl}
        </a>`;
            }).join('');

            if (reset) {
                grid.innerHTML = cards;
            } else {
                grid.innerHTML += cards;
            }

            loadMoreBtn.style.display = offset + PAGE_SIZE < allResults.length ? 'block' : 'none';
        }

        function formatPrice(v) {
            if (v == null) return '—';
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
        }

        if (query.length >= 2) fetchResults();
        else grid.innerHTML = '<p class="empty">digite algo para buscar</p>';
    </script>

</body>

</html>
