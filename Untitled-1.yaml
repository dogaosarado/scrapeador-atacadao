name: Run Scraper

on:
  schedule:
    - cron: '0 3,15 * * *'  # 00:00 and 12:00 Brazil (UTC-3)
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scraper
        run: |
          python novissmoscrapeador.py

      - name: Convert JSON to DB
        run: |
          python json_to_db.py

      - name: Commit database
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Update database" || echo "No changes"
          git push